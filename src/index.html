<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Collection Studio Pro</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div id="app">

    <header>

        <div>
    
            <div class="title">
                Collection Studio Pro
            </div>
    
            <div id="projectName">
                Untitled Project
            </div>
    
        </div>
    
        <div id="version"></div>
    
    </header>
    <aside>

        <button class="nav active">
            Collections
        </button>

        <button class="nav">
            Assets
        </button>

        <button class="nav">
            Metadata
        </button>

        <button class="nav">
            Export
        </button>

    </aside>

    <main>

        <section class="toolbar">

            <button id="newCollection">
                New Collection
            </button>

            <button id="deleteCollection">
                Delete
            </button>

        </section>

        <section class="content">

            <div class="panel">

                <h2>
                    Collections
                </h2>

                <table id="collectionTable">

                    <thead>

                        <tr>

                            <th>Name</th>
                            <th>Images</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

            <div class="panel">

                <h2>
                    Details
                </h2>

                <label>

                    Collection Name

                    <input
                        id="collectionName"
                        type="text"
                    >

                </label>

                <label>

                    Description

                    <textarea
                        id="collectionDescription"
                    ></textarea>

                </label>

                <button id="saveCollection">
                    Save
                </button>

            </div>

        </section>

    </main>

</div>

<script type="module" src="renderer.js"></script>

</body>
